<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transformers.js | Real-time object detection</title>
    <link rel="stylesheet" href="/style.css" />
  </head>

  <body>
    <h1>
      Person detection w/
      <a href="https://github.com/WongKinYiu/yolov9" target="_blank">YOLOv9</a>
      + depth at center
    </h1>
    <h4>
      Depth:
      <a
        href="https://huggingface.co/onnx-community/depth-anything-v2-small"
        target="_blank"
        >Depth Anything V2</a
      >
      · Runs locally via
      <a href="http://github.com/huggingface/transformers.js" target="_blank"
        >🤗 Transformers.js</a
      >
    </h4>
    <div id="camera-panels" class="camera-panels">
      <div class="camera-panel">
        <div class="camera-panel-title">Camera + detection</div>
        <div id="container">
          <video id="video" autoplay muted playsinline></video>
          <canvas id="canvas" width="360" height="240"></canvas>
          <div id="overlay"></div>
        </div>
      </div>
      <div class="camera-panel">
        <div class="camera-panel-title">Depth heat map</div>
        <div id="depth-container">
          <canvas id="depth-canvas"></canvas>
        </div>
      </div>
    </div>
    <div id="controls">
      <div>
        <label>Image size</label>
        (<label id="size-value">128</label>)
        <br />
        <input
          id="size"
          type="range"
          min="64"
          max="256"
          step="32"
          value="128"
          disabled
        />
      </div>
      <div>
        <label>Threshold</label>
        (<label id="threshold-value">0.25</label>)
        <br />
        <input
          id="threshold"
          type="range"
          min="0.01"
          max="1"
          step="0.01"
          value="0.25"
          disabled
        />
      </div>
      <div>
        <label>Scale</label>
        (<label id="scale-value">0.5</label>)
        <br />
        <input
          id="scale"
          type="range"
          min="0.01"
          max="1"
          step="0.01"
          value="0.5"
          disabled
        />
      </div>
      <div title="Depth model input size (lower = faster)">
        <label>Depth size</label>
        (<label id="depth-size-value">504</label>px)
        <br />
        <input
          id="depth-size"
          type="range"
          min="140"
          max="840"
          step="14"
          value="504"
          disabled
        />
      </div>
    </div>
    <label id="status"></label>

    <script type="module" src="/main.js"></script>
  </body>
</html>
